<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>採用応募フォーム｜ラウンジ カトレア</title>
<style>
:root{--brown:#3d2b1f;--cream:#fdf8f4;--line:#dfcbb8}*{box-sizing:border-box}body{margin:0;background:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:#30251f;line-height:1.7}.wrap{max-width:720px;margin:auto;padding:28px 16px 48px}header{background:var(--brown);color:#fff;padding:28px 22px;border-radius:18px;margin-bottom:18px}h1{font-size:25px;margin:0 0 7px}header p{margin:0;color:#f3e7dc;font-size:14px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:21px 16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:5px}.full{grid-column:1/-1}label{font-weight:700;font-size:14px}input,select,textarea{font:inherit;padding:11px;border:1px solid #cdb8a5;border-radius:9px;background:#fffcf9}textarea{min-height:100px}.btn{width:100%;padding:15px;margin-top:18px;border:0;border-radius:10px;background:var(--brown);color:#fff;font:inherit;font-weight:700;font-size:16px}.note{font-size:12px;color:#75695e;margin-top:12px}@media(max-width:550px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style></head>
<body><main class="wrap"><header><h1>ラウンジ カトレア　採用応募フォーム</h1><p>厨房スタッフ1名・ホールスタッフ1名を募集しています。</p></header>
<section class="card"><form action="https://formsubmit.co/cattleya@via.tokyo.jp" method="POST">
<input type="hidden" name="_subject" value="【ラウンジ カトレア】採用応募">
<input type="hidden" name="_template" value="table"><input type="hidden" name="_captcha" value="false"><input type="hidden" name="_next" value="https://cattleya-recruit.vercel.app/">
<div class="grid">
<div class="field full"><label>希望職種</label><select name="希望職種" required><option value="">選択してください</option><option>厨房スタッフ</option><option>ホールスタッフ</option></select></div>
<div class="field"><label>お名前</label><input name="お名前" required></div><div class="field"><label>年齢</label><input name="年齢" inputmode="numeric" required></div>
<div class="field"><label>電話番号</label><input name="電話番号" type="tel" required></div><div class="field"><label>メールアドレス</label><input name="メールアドレス" type="email" required></div>
<div class="field"><label>希望勤務日数</label><select name="希望勤務日数" required><option value="">選択してください</option><option>週1日</option><option>週2日</option><option>週3日</option></select></div>
<div class="field"><label>希望開始時間</label><select name="希望開始時間" required><option value="">選択してください</option><option>15時から</option><option>16時から</option></select></div>
<div class="field full"><label>勤務可能な曜日</label><input name="勤務可能な曜日" placeholder="例：月・水・金"></div>
<div class="field"><label>飲食店勤務経験</label><select name="飲食店勤務経験" required><option value="">選択してください</option><option>あり</option><option>なし</option></select></div>
<div class="field"><label>連絡しやすい時間帯</label><input name="連絡しやすい時間帯"></div>
<div class="field full"><label>自己PR・質問など（任意）</label><textarea name="自己PR・質問など"></textarea></div>
</div><button class="btn" type="submit">この内容で応募する</button><p class="note">送信後、初回のみフォーム有効化の確認メールが届く場合があります。</p>
</form></section></main></body></html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cattleya 詳細（閲覧専用）</title>
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/cattleya-AYC/cattleya-order/main/Analytics.PNG">
<link rel="icon" href="https://raw.githubusercontent.com/cattleya-AYC/cattleya-order/main/Analytics.PNG">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0905;
    color: #f0e6d0;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    background: #181008;
    border-bottom: 1px solid #3d2c14;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-title {
    font-size: 18px;
    color: #c9952a;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .header-date {
    font-size: 12px;
    color: #8a7050;
  }

  /* 日付選択 */
  .date-bar {
    background: #181008;
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid #3d2c14;
  }
  .date-bar input[type="date"] {
    background: #251a0a;
    border: 1px solid #3d2c14;
    border-radius: 8px;
    color: #f0e6d0;
    padding: 8px 12px;
    font-size: 14px;
    flex: 1;
  }
  .btn-reload {
    background: #c9952a;
    border: none;
    border-radius: 8px;
    color: #0d0905;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* タブ */
  .tabs {
    display: flex;
    background: #181008;
    border-bottom: 2px solid #3d2c14;
  }
  .tab {
    flex: 1;
    padding: 14px 8px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: #8a7050;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: #c9952a;
    border-bottom: 3px solid #c9952a;
    background: #1a1008;
  }

  /* コンテンツ */
  .content { padding: 14px 12px; }

  /* サマリーカード */
  .summary-card {
    background: #181008;
    border: 1px solid #3d2c14;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .summary-card .label {
    font-size: 12px;
    color: #8a7050;
    margin-bottom: 4px;
  }
  .summary-card .amount {
    font-size: 32px;
    font-weight: 900;
    color: #c9952a;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #3d2c1433;
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .slabel { color: #8a7050; }
  .summary-row .sval { color: #c9952a; font-weight: 700; }

  /* ペイキャス取引リスト */
  .pay-item {
    background: #181008;
    border: 1px solid #3d2c14;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pay-item .time { color: #8a7050; font-size: 13px; }
  .pay-item .table { color: #f0e6d0; font-size: 15px; font-weight: 700; margin-top: 2px; }
  .pay-item .pamount { color: #c9952a; font-size: 20px; font-weight: 900; }

  /* 来店者カード */
  .visit-card {
    background: #181008;
    border: 1px solid #3d2c14;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .visit-header {
    background: #251a0a;
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .visit-header .vtable {
    font-size: 20px;
    font-weight: 900;
    color: #c9952a;
  }
  .visit-header .vinfo {
    font-size: 12px;
    color: #8a7050;
    margin-top: 2px;
  }
  .visit-header .vtotal {
    text-align: right;
  }
  .visit-header .vtotal-amount {
    font-size: 22px;
    font-weight: 900;
    color: #c9952a;
  }
  .visit-header .vtotal-pay {
    font-size: 12px;
    color: #8a7050;
    margin-top: 2px;
  }
  .visit-body { padding: 10px 14px; }
  .order-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid #3d2c1422;
    font-size: 13px;
  }
  .order-row:last-child { border-bottom: none; }
  .order-name { color: #f0e6d0; flex: 1; }
  .order-qty { color: #8a7050; margin: 0 10px; }
  .order-price { color: #c9952a; }
  .order-price.discount { color: #4aaa5a; }

  /* ローディング・エラー */
  .loading {
    text-align: center;
    color: #8a7050;
    padding: 40px;
    font-size: 14px;
  }
  .empty {
    text-align: center;
    color: #3d2c14;
    padding: 40px;
    font-size: 14px;
  }

  /* 閲覧専用：ペイキャス精算・データ変更機能は削除済み */
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🌸 Cattleya 詳細（閲覧専用）</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="date-bar">
  <input type="date" id="dateInput">
  <button class="btn-reload" onclick="loadAll()">表示</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('paycas')" id="tab-paycas">💳 ペイキャス</div>
  <div class="tab" onclick="switchTab('visit')" id="tab-visit">👥 来店者</div>
  <div class="tab" onclick="switchTab('summary')" id="tab-summary">📊 途中集計</div>
</div>

<div class="content" id="content-paycas">
  <div class="loading">読み込み中...</div>
</div>

<div class="content" id="content-visit" style="display:none">
  <div class="loading">読み込み中...</div>
</div>

<div class="content" id="content-summary" style="display:none">
  <div class="loading">読み込み中...</div>
</div>

<script>
const SUPABASE_URL = "https://zxdgiszrsmumjjxmvszb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4ZGdpc3pyc211bWpqeG12c3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODM2MTksImV4cCI6MjA5NTI1OTYxOX0.vNndS7JEzIUsa007EPO2zRoYhUr-z01LM32BKIhMSz4";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTab = 'paycas';
let salesData = [];
let orderItemsData = [];
let selectedDate = '';

// 今日の日付をセット
const today = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Tokyo" }).split(" ")[0];
document.getElementById('dateInput').value = today;
document.getElementById('headerDate').textContent = today;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-paycas').className = 'tab' + (tab === 'paycas' ? ' active' : '');
  document.getElementById('tab-visit').className = 'tab' + (tab === 'visit' ? ' active' : '');
  document.getElementById('tab-summary').className = 'tab' + (tab === 'summary' ? ' active' : '');
  document.getElementById('content-paycas').style.display = tab === 'paycas' ? '' : 'none';
  document.getElementById('content-visit').style.display = tab === 'visit' ? '' : 'none';
  document.getElementById('content-summary').style.display = tab === 'summary' ? '' : 'none';
}

async function loadAll() {
  selectedDate = document.getElementById('dateInput').value;
  document.getElementById('headerDate').textContent = selectedDate;

  document.getElementById('content-paycas').innerHTML = '<div class="loading">読み込み中...</div>';
  document.getElementById('content-visit').innerHTML = '<div class="loading">読み込み中...</div>';
  document.getElementById('content-summary').innerHTML = '<div class="loading">読み込み中...</div>';

  const [{ data: sales }, { data: items }] = await Promise.all([
    sb.from("sales").select("*").eq("sale_date", selectedDate).order("sale_time", { ascending: true }),
    sb.from("order_items").select("*").eq("sale_date", selectedDate).order("sale_time", { ascending: true }),
  ]);

  salesData = sales || [];
  orderItemsData = items || [];

  renderPaycas();
  renderVisit();
  renderSummary();
}

function renderPaycas() {
  const paycasSales = salesData.filter(s => s.pay_method === 'ペイキャス');
  const paycasTotal = paycasSales.reduce((a, s) => a + s.amount, 0);
  const cashTotal = salesData.filter(s => s.pay_method === '現金').reduce((a, s) => a + s.amount, 0);
  const grandTotal = salesData.reduce((a, s) => a + s.amount, 0);

  let html = '';
  html += `<div style="background:#20190e;border:1px solid #80611e;border-radius:10px;padding:11px 13px;margin-bottom:14px;color:#d9bb70;font-size:13px;line-height:1.55;">🔒 閲覧専用です。売上・ペイキャスの調整、保存、送信はできません。</div>`;

  // 閲覧専用版：ペイキャス精算・調整実行は表示しません

  // サマリー
  html += `
  <div class="summary-card">
    <div class="label">本日ペイキャス合計</div>
    <div class="amount">¥${paycasTotal.toLocaleString()}</div>
    <div style="margin-top:12px">
      <div class="summary-row"><span class="slabel">現金合計</span><span class="sval">¥${cashTotal.toLocaleString()}</span></div>
      <div class="summary-row"><span class="slabel">総売上</span><span class="sval">¥${grandTotal.toLocaleString()}</span></div>
      <div class="summary-row"><span class="slabel">ペイキャス件数</span><span class="sval">${paycasSales.length}件</span></div>
    </div>
  </div>`;

  // ペイキャス取引一覧
  if (paycasSales.length === 0) {
    html += '<div class="empty">ペイキャス取引なし</div>';
  } else {
    html += `<div style="color:#8a7050;font-size:12px;margin-bottom:8px">取引一覧</div>`;
    paycasSales.forEach(s => {
      html += `
      <div class="pay-item">
        <div>
          <div class="time">${s.sale_time || '-'}</div>
          <div class="table">テーブル ${s.table_no}</div>
        </div>
        <div class="pamount">¥${s.amount.toLocaleString()}</div>
      </div>`;
    });
  }

  document.getElementById('content-paycas').innerHTML = html;
}

function renderVisit() {
  if (salesData.length === 0) {
    document.getElementById('content-visit').innerHTML = '<div class="empty">データなし</div>';
    return;
  }

  // テーブル×時間でグループ化（同じテーブルでも時間が違えば別客）
  // salesを来店順に並べる
  const sorted = [...salesData].sort((a, b) => (a.sale_time || '').localeCompare(b.sale_time || ''));

  let html = `<div style="color:#8a7050;font-size:12px;margin-bottom:10px">${sorted.length}組 来店</div>`;

  sorted.forEach(sale => {
    // そのテーブルの注文をsale_timeで紐付け（同じ退店時間のもの）
    const items = orderItemsData.filter(o =>
      String(o.table_no) === String(sale.table_no) && o.sale_time === sale.sale_time
    );

    const payColor = sale.pay_method === 'ペイキャス' ? '#5a8aca' : '#4aaa5a';

    html += `
    <div class="visit-card">
      <div class="visit-header">
        <div>
          <div class="vtable">テーブル ${sale.table_no}</div>
          <div class="vinfo">退店 ${sale.sale_time || '-'}　${sale.people_count || '-'}名</div>
        </div>
        <div class="vtotal">
          <div class="vtotal-amount">¥${sale.amount.toLocaleString()}</div>
          <div class="vtotal-pay" style="color:${payColor}">${sale.pay_method || '-'}</div>
        </div>
      </div>`;

    if (items.length > 0) {
      html += `<div class="visit-body">`;
      items.forEach(o => {
        const subtotal = o.price * o.qty;
        const isDiscount = o.price < 0;
        html += `
        <div class="order-row">
          <span class="order-name">${o.item_name}</span>
          <span class="order-qty">×${o.qty}</span>
          <span class="order-price ${isDiscount ? 'discount' : ''}">
            ${isDiscount ? '-' : ''}¥${Math.abs(subtotal).toLocaleString()}
          </span>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="visit-body"><div style="color:#3d2c14;font-size:12px">注文明細なし</div></div>`;
    }

    html += `</div>`;
  });

  document.getElementById('content-visit').innerHTML = html;
}


function renderSummary() {
  const cashSales = salesData.filter(s => s.pay_method === '現金');
  const paycasSales = salesData.filter(s => s.pay_method === 'ペイキャス');
  const cashTotal = cashSales.reduce((a, s) => a + s.amount, 0);
  const paycasTotal = paycasSales.reduce((a, s) => a + s.amount, 0);
  const grandTotal = salesData.reduce((a, s) => a + s.amount, 0);
  const totalCount = salesData.length;
  const totalPeople = salesData.reduce((a, s) => a + (s.people_count || 0), 0);
  const cashCount = cashSales.length;
  const paycasCount = paycasSales.length;
  const cashMorning = cashSales.filter(s => (s.sale_time || '') < '15:00').reduce((a, s) => a + s.amount, 0);
  const cashEvening = cashSales.filter(s => (s.sale_time || '') >= '15:00').reduce((a, s) => a + s.amount, 0);

  // 時間帯別
  const groups = {};
  salesData.forEach(s => {
    const h = (s.sale_time || '').split(':')[0] || '不明';
    if (!groups[h]) groups[h] = { count: 0, amount: 0 };
    groups[h].count++;
    groups[h].amount += s.amount;
  });

  const now = new Date();
  const timeStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日　'
    + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  let html = '';

  // 印刷ボタン
  html += `
  <div style="margin-bottom:14px">
    <button onclick="printSummary()" style="width:100%;padding:16px;background:#c9952a;border:none;border-radius:12px;color:#0d0905;font-size:18px;font-weight:900;cursor:pointer;">
      🖨 レシート印刷（PassPRNT）
    </button>
  </div>`;

  // サマリー
  html += `
  <div class="summary-card">
    <div class="label">集計時刻：${timeStr}</div>
    <div class="amount" style="margin-top:8px">¥${grandTotal.toLocaleString()}</div>
    <div style="margin-top:12px">
      <div class="summary-row"><span class="slabel">現金（${cashCount}件）</span><span class="sval">¥${cashTotal.toLocaleString()}</span></div>
      <div class="summary-row" style="padding-left:12px"><span class="slabel">　朝〜15時</span><span class="sval">¥${cashMorning.toLocaleString()}</span></div>
      <div class="summary-row" style="padding-left:12px"><span class="slabel">　15時〜閉店</span><span class="sval">¥${cashEvening.toLocaleString()}</span></div>
      <div class="summary-row"><span class="slabel">ペイキャス（${paycasCount}件）</span><span class="sval">¥${paycasTotal.toLocaleString()}</span></div>
      <div class="summary-row"><span class="slabel">来客組数</span><span class="sval">${totalCount}組</span></div>
      <div class="summary-row"><span class="slabel">来客人数</span><span class="sval">${totalPeople}名</span></div>
    </div>
  </div>`;

  // 時間帯別
  html += `<div class="summary-card"><div class="label" style="margin-bottom:10px">時間帯別売上</div>`;
  Object.entries(groups).sort().forEach(([h, g]) => {
    html += `<div class="summary-row">
      <span class="slabel">${h}:00〜${Number(h)+1}:00</span>
      <span style="color:#8a7050;font-size:12px">${g.count}件</span>
      <span class="sval">¥${g.amount.toLocaleString()}</span>
    </div>`;
  });
  html += '</div>';

  document.getElementById('content-summary').innerHTML = html;
}

function printSummary() {
  const cashSales = salesData.filter(s => s.pay_method === '現金');
  const paycasSales = salesData.filter(s => s.pay_method === 'ペイキャス');
  const cashTotal = cashSales.reduce((a, s) => a + s.amount, 0);
  const paycasTotal = paycasSales.reduce((a, s) => a + s.amount, 0);
  const grandTotal = salesData.reduce((a, s) => a + s.amount, 0);
  const totalCount = salesData.length;
  const totalPeople = salesData.reduce((a, s) => a + (s.people_count || 0), 0);
  const cashCount = cashSales.length;
  const paycasCount = paycasSales.length;
  const cashMorningP = cashSales.filter(s => (s.sale_time || '') < '15:00').reduce((a, s) => a + s.amount, 0);
  const cashEveningP = cashSales.filter(s => (s.sale_time || '') >= '15:00').reduce((a, s) => a + s.amount, 0);

  const groups = {};
  salesData.forEach(s => {
    const h = (s.sale_time || '').split(':')[0] || '不明';
    if (!groups[h]) groups[h] = { count: 0, amount: 0 };
    groups[h].count++;
    groups[h].amount += s.amount;
  });

  const now = new Date();
  const timeStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 '
    + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  const hourRows = Object.entries(groups).sort().map(([h, g]) =>
    `<tr><td>${h}:00〜${Number(h)+1}:00</td><td style="text-align:right">${g.count}件</td><td style="text-align:right">¥${g.amount.toLocaleString()}</td></tr>`
  ).join('');

  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>
    body{font-family:'Hiragino Mincho ProN',serif;width:384px;margin:0;padding:4px 6px;font-size:26px;font-weight:700;color:#000;}
    .title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 2px;}
    .sub{text-align:center;font-size:22px;margin-bottom:6px;}
    .hr{border:none;border-top:1px solid #000;margin:6px 0;}
    table{width:100%;border-collapse:collapse;}
    td{padding:5px 2px;font-size:24px;font-weight:700;}
    .total{font-size:30px;font-weight:900;}
  </style></head><body>
    <div class="title">ラウンジ カトレア</div>
    <div class="sub">途中集計</div>
    <div style="text-align:right;font-size:20px">${timeStr}</div>
    <hr class="hr"/>
    <table>${hourRows}</table>
    <hr class="hr"/>
    <table>
      <tr class="total"><td>総売上</td><td style="text-align:right">¥${grandTotal.toLocaleString()}</td></tr>
      <tr><td>現金（${cashCount}件）</td><td style="text-align:right">¥${cashTotal.toLocaleString()}</td></tr>
      <tr><td>　朝〜15時</td><td style="text-align:right">¥${cashMorningP.toLocaleString()}</td></tr>
      <tr><td>　15時〜閉店</td><td style="text-align:right">¥${cashEveningP.toLocaleString()}</td></tr>
      <tr><td>ペイキャス（${paycasCount}件）</td><td style="text-align:right">¥${paycasTotal.toLocaleString()}</td></tr>
      <tr><td>来客組数</td><td style="text-align:right">${totalCount}組</td></tr>
      <tr><td>来客人数</td><td style="text-align:right">${totalPeople}名</td></tr>
    </table>
    <hr class="hr"/>
    <div style="text-align:center;font-size:22px">ありがとうございました</div>
  </body></html>`;

  const url = 'starpassprnt://v1/print/nopreview?back=' + encodeURIComponent(location.href) + '&html=' + encodeURIComponent(html);
  window.location.href = url;
}

// 初回読込
loadAll();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cattleya 現金確認（閲覧用）</title>
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/cattleya-AYC/cattleya-order/main/public/count.PNG">
<link rel="icon" href="https://raw.githubusercontent.com/cattleya-AYC/cattleya-order/main/public/count.PNG">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0905;
    color: #f0e6d0;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    min-height: 100vh;
  }
  .header {
    background: #181008;
    border-bottom: 1px solid #3d2c14;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-title { font-size: 18px; color: #c9952a; font-weight: 700; }
  .header-time { font-size: 12px; color: #8a7050; }

  .tabs {
    display: flex;
    background: #181008;
    border-bottom: 2px solid #3d2c14;
  }
  .tab {
    flex: 1;
    padding: 14px 8px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: #8a7050;
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .tab.active {
    color: #c9952a;
    border-bottom: 3px solid #c9952a;
    background: #1a1008;
  }

  .content { padding: 14px 12px; }

  /* 現金入力 */
  .section-title {
    font-size: 13px;
    color: #8a7050;
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #3d2c14;
    letter-spacing: 2px;
  }
  .cash-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #3d2c1433;
    gap: 12px;
  }
  .cash-label {
    font-size: 26px;
    color: #c9952a;
    font-weight: 900;
    min-width: 110px;
  }
  .cash-unit {
    font-size: 18px;
    color: #8a7050;
    width: 16px;
  }
  .cash-input {
    width: 90px;
    background: #251a0a;
    border: 2px solid #3d2c14;
    border-radius: 8px;
    color: #f0e6d0;
    padding: 12px 8px;
    font-size: 28px;
    font-weight: 900;
    text-align: center;
    -webkit-appearance: none;
  }
  .cash-input:focus {
    outline: none;
    border-color: #c9952a;
  }
  .cash-suffix {
    font-size: 20px;
    color: #8a7050;
    min-width: 24px;
  }
  .cash-subtotal {
    flex: 1;
    text-align: right;
    font-size: 18px;
    color: #f0e6d0;
    font-weight: 700;
    font-family: serif;
  }
  .cash-subtotal.has-value { color: #c9952a; }

  /* 合計エリア */
  .total-area {
    background: #181008;
    border: 2px solid #c9952a;
    border-radius: 12px;
    padding: 16px;
    margin: 20px 0;
  }
  .total-label { font-size: 14px; color: #8a7050; margin-bottom: 6px; }
  .total-amount { font-size: 42px; font-weight: 900; color: #c9952a; font-family: serif; }

  /* 釣り銭比較 */
  .compare-area {
    background: #1a1008;
    border: 1px solid #3d2c14;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .compare-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 14px;
  }
  .compare-row .cl { color: #8a7050; }
  .compare-row .cv { color: #f0e6d0; font-weight: 700; }
  .diff-plus { color: #5a8aca; font-weight: 900; font-size: 18px; }
  .diff-minus { color: #c95a5a; font-weight: 900; font-size: 18px; }
  .diff-zero { color: #4aaa5a; font-weight: 900; font-size: 18px; }

  /* ボタン */
  .btn-save {
    width: 100%;
    padding: 18px;
    background: #c9952a;
    border: none;
    border-radius: 12px;
    color: #0d0905;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn-clear {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid #3d2c14;
    border-radius: 10px;
    color: #8a7050;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  /* 履歴 */
  .history-card {
    background: #181008;
    border: 1px solid #3d2c14;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .history-time { font-size: 13px; color: #8a7050; }
  .history-total { font-size: 22px; font-weight: 900; color: #c9952a; }
  .history-detail {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .history-chip {
    background: #251a0a;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    color: #f0e6d0;
  }
  .loading { text-align: center; color: #8a7050; padding: 40px; }
  .empty { text-align: center; color: #3d2c14; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <button onclick="location.href='https://timecard-exec.vercel.app/cattleya_owner_dashboard.html'" style="padding:10px 18px;background:#c9952a;border:none;border-radius:8px;color:#0d0905;font-size:16px;font-weight:900;cursor:pointer;">← 経営者ページへ</button>
    <div class="header-title">👁️ Cattleya 現金確認</div>
  </div>
  <div class="header-time" id="currentTime"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('count')" id="tab-count">💴 現金カウント</div>
  <div class="tab" onclick="switchTab('history')" id="tab-history">📋 記録履歴（閲覧）</div>
</div>

<!-- ページ2：現金カウント -->
<div class="content" id="page-count">

  <div class="section-title">お　札</div>

  <div class="cash-row">
    <div class="cash-label">1万円札</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v10000" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">枚</div>
    <div class="cash-subtotal" id="s10000">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">5千円札</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v5000" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">枚</div>
    <div class="cash-subtotal" id="s5000">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">千円札</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v1000" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">枚</div>
    <div class="cash-subtotal" id="s1000">—</div>
  </div>

  <div class="section-title">コ イ ン</div>

  <div class="cash-row">
    <div class="cash-label">500円玉</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v500" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">個</div>
    <div class="cash-subtotal" id="s500">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">100円玉</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v100" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">個</div>
    <div class="cash-subtotal" id="s100">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">50円玉</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v50" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">個</div>
    <div class="cash-subtotal" id="s50">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">10円玉</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v10" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">個</div>
    <div class="cash-subtotal" id="s10">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">5円玉</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v5" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">個</div>
    <div class="cash-subtotal" id="s5">—</div>
  </div>
  <div class="cash-row">
    <div class="cash-label">1円玉</div>
    <div class="cash-unit">×</div>
    <input type="number" class="cash-input" id="v1" min="0" placeholder="0" oninput="calc()">
    <div class="cash-suffix">個</div>
    <div class="cash-subtotal" id="s1">—</div>
  </div>

  <div class="total-area">
    <div class="total-label">合　計</div>
    <div class="total-amount" id="totalAmount">¥0</div>
  </div>

  <!-- レジあるべき金額との比較 -->
  <div class="compare-area" id="compareArea" style="display:none">
    <div class="compare-row" id="row-morning" style="display:none">
      <span class="cl">15時までの現金</span>
      <span class="cv" id="morningAmount">—</span>
    </div>
    <div class="compare-row" id="row-evening" style="display:none">
      <span class="cl">15時以降の現金</span>
      <span class="cv" id="eveningAmount">—</span>
    </div>
    <div class="compare-row">
      <span class="cl">釣り銭（固定）</span>
      <span class="cv">¥50,000</span>
    </div>
    <div class="compare-row" style="border-top:1px solid #3d2c14;margin-top:6px;padding-top:10px">
      <span class="cl" id="shouldLabel">レジあるべき金額</span>
      <span class="cv" id="shouldAmount">—</span>
    </div>
    <div class="compare-row">
      <span class="cl">実際のカウント</span>
      <span class="cv" id="actualAmount">—</span>
    </div>
    <div class="compare-row" style="border-top:1px solid #3d2c14;margin-top:6px;padding-top:10px">
      <span class="cl">差　額</span>
      <span id="diffAmount">—</span>
    </div>
  </div>

  <div style="text-align:center;color:#8a7050;font-size:13px;line-height:1.65;margin:6px 0 12px;">この画面では、入力内容は保存されません。<br>履歴は本番カウントアプリの記録を表示しています。</div>
  <button class="btn-clear" onclick="clearAll()">🗑 クリア</button>

</div>

<div class="content" id="content-history" style="display:none">
  <div class="loading">読み込み中...</div>
</div>

<script>
const SUPABASE_URL = "https://zxdgiszrsmumjjxmvszb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4ZGdpc3pyc211bWpqeG12c3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODM2MTksImV4cCI6MjA5NTI1OTYxOX0.vNndS7JEzIUsa007EPO2zRoYhUr-z01LM32BKIhMSz4";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DENOMS = [10000, 5000, 1000, 500, 100, 50, 10, 5, 1];

// 時刻表示
function updateTime() {
  const now = new Date();
  const t = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0')
    + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('currentTime').textContent = t;
}
updateTime();
setInterval(updateTime, 10000);

function switchTab(tab) {
  document.getElementById('tab-count').className = 'tab' + (tab === 'count' ? ' active' : '');
  document.getElementById('tab-history').className = 'tab' + (tab === 'history' ? ' active' : '');
  if (tab === 'count') {
    document.getElementById('page-count').style.display = '';
    document.getElementById('content-history').style.display = 'none';
  } else {
    document.getElementById('page-count').style.display = 'none';
    document.getElementById('content-history').style.display = '';
    loadHistory();
  }
}

function getValues() {
  const vals = {};
  DENOMS.forEach(d => {
    vals[d] = parseInt(document.getElementById('v' + d).value) || 0;
  });
  return vals;
}

function calc() {
  const vals = getValues();
  let total = 0;
  DENOMS.forEach(d => {
    const sub = vals[d] * d;
    total += sub;
    const el = document.getElementById('s' + d);
    if (vals[d] > 0) {
      el.textContent = '¥' + sub.toLocaleString();
      el.className = 'cash-subtotal has-value';
    } else {
      el.textContent = '—';
      el.className = 'cash-subtotal';
    }
  });
  document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();

  // レジあるべき金額と比較（Supabaseから取得済みなら）
  if (window._shouldCash !== undefined) {
    const diff = total - window._shouldCash;
    document.getElementById('shouldAmount').textContent = '¥' + window._shouldCash.toLocaleString();
    if (window._shouldLabel) document.getElementById('shouldLabel').textContent = window._shouldLabel;
    document.getElementById('actualAmount').textContent = '¥' + total.toLocaleString();
    const diffEl = document.getElementById('diffAmount');
    if (diff === 0) {
      diffEl.innerHTML = '<span class="diff-zero">¥0（一致 ✅）</span>';
    } else if (diff > 0) {
      diffEl.innerHTML = `<span class="diff-plus">+¥${diff.toLocaleString()}（多い）</span>`;
    } else {
      diffEl.innerHTML = `<span class="diff-minus">-¥${Math.abs(diff).toLocaleString()}（不足）</span>`;
    }
    document.getElementById('compareArea').style.display = '';
  }

  return total;
}

function updateShouldCash() {
  if (!window._salesData) return;
  const data = window._salesData;
  const now = new Date();
  const currentHour = now.getHours();
  const currentMin = now.getMinutes();

  const cashMorning = data.filter(s => s.pay_method === '現金' && (s.sale_time || '') < '15:00').reduce((a, s) => a + s.amount, 0);
  const cashAll = data.filter(s => s.pay_method === '現金').reduce((a, s) => a + s.amount, 0);
  const cashEvening = cashAll - cashMorning;

  // 20:10以降は閉店モード：釣り銭¥50,000のみ
  if (currentHour > 20 || (currentHour === 20 && currentMin >= 10)) {
    window._shouldCash = 50000;
    window._shouldLabel = 'レジあるべき金額（釣り銭のみ・閉店）';
    document.getElementById('row-morning').style.display = 'none';
    document.getElementById('row-evening').style.display = 'none';

  } else if (currentHour >= 15) {
      // 15時以降：15時分は入金済みとして計算
      window._shouldCash = cashEvening + 50000;
      window._shouldLabel = 'レジあるべき金額（15時以降＋釣り銭）';
      document.getElementById('row-morning').style.display = '';
      document.getElementById('row-evening').style.display = '';
      document.getElementById('morningAmount').textContent = '¥' + cashMorning.toLocaleString() + '（入金済み）';
      document.getElementById('eveningAmount').textContent = '¥' + cashEvening.toLocaleString();
  } else {
    window._shouldCash = cashAll + 50000;
    window._shouldLabel = 'レジあるべき金額（全現金＋釣り銭）';
    document.getElementById('row-morning').style.display = 'none';
    document.getElementById('row-evening').style.display = 'none';
  }
  calc();
}

async function loadShouldCash() {
  const today = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Tokyo" }).split(" ")[0];
  const { data } = await sb.from("sales").select("amount,pay_method,sale_time").eq("sale_date", today);
  if (data) {
    window._salesData = data;
    const now = new Date();
    updateShouldCash();
  }
}

loadShouldCash();

function clearAll() {
  DENOMS.forEach(d => {
    document.getElementById('v' + d).value = '';
    document.getElementById('s' + d).textContent = '—';
    document.getElementById('s' + d).className = 'cash-subtotal';
  });
  document.getElementById('totalAmount').textContent = '¥0';
}

async function loadHistory() {
  document.getElementById('content-history').innerHTML = '<div class="loading">読み込み中...</div>';

  // 両テーブルを並行取得
  const [{ data: data1, error: err1 }, { data: data2, error: err2 }] = await Promise.all([
    sb.from("cash_counts").select("*").order("counted_at", { ascending: false }).limit(30),
    sb.from("cashcheck_logs").select("*").order("checked_at", { ascending: false }).limit(30),
  ]);

  if (err1 && err2) {
    document.getElementById('content-history').innerHTML = '<div class="empty">テーブルが未作成です</div>';
    return;
  }

  // cash_countsのデータはそのまま使用
  const rows1 = (data1 || []).map(r => ({
    counted_at: r.counted_at,
    count_date: r.count_date,
    count_time: r.count_time,
    staff: r.staff,
    total_amount: r.total_amount,
    diff_amount: r.diff_amount,
    chips: [
      r.v10000 && `1万×${r.v10000}`,
      r.v5000  && `5千×${r.v5000}`,
      r.v1000  && `千×${r.v1000}`,
      r.v500   && `500×${r.v500}`,
      r.v100   && `100×${r.v100}`,
      r.v50    && `50×${r.v50}`,
      r.v10    && `10×${r.v10}`,
      r.v5     && `5×${r.v5}`,
      r.v1     && `1×${r.v1}`,
    ].filter(Boolean),
  }));

  // cashcheck_logsはcash_countsに存在しない日時のみ使用（重複排除）
  const existingKeys = new Set(rows1.map(r => r.counted_at));
  const rows2 = (data2 || [])
    .filter(r => !existingKeys.has(r.checked_at))
    .map(r => {
      const jst = new Date(r.checked_at).toLocaleString("sv-SE", { timeZone: "Asia/Tokyo" });
      return {
        counted_at: r.checked_at,
        count_date: jst.split(" ")[0],
        count_time: jst.split(" ")[1].slice(0,5),
        staff: r.staff,
        total_amount: null,
        diff_amount: r.diff,
        chips: [],
      };
    });

  // 日時順（新しい順）にマージ
  const allRows = [...rows1, ...rows2].sort((a, b) => new Date(b.counted_at) - new Date(a.counted_at)).slice(0, 40);

  if (allRows.length === 0) {
    document.getElementById('content-history').innerHTML = '<div class="empty">記録なし</div>';
    return;
  }

  let html = '';
  allRows.forEach(r => {
    let diffHtml = '';
    if (r.diff_amount !== null) {
      if (r.diff_amount === 0) diffHtml = '<span style="color:#4aaa5a;font-size:12px">　✅ 一致</span>';
      else if (r.diff_amount > 0) diffHtml = `<span style="color:#5a8aca;font-size:12px">　+¥${r.diff_amount.toLocaleString()}</span>`;
      else diffHtml = `<span style="color:#c95a5a;font-size:12px">　-¥${Math.abs(r.diff_amount).toLocaleString()}</span>`;
    }

    const totalHtml = r.total_amount !== null
      ? `<div class="history-total">¥${r.total_amount.toLocaleString()}</div>`
      : `<div class="history-total" style="color:#8a7050;font-size:16px">—</div>`;

    html += `
    <div class="history-card">
      <div class="history-header">
        <div>
          <div class="history-time">${r.count_date} ${r.count_time}${r.staff ? "　" + r.staff : ""}</div>
          ${diffHtml}
        </div>
        ${totalHtml}
      </div>
      <div class="history-detail">
        ${r.chips.map(c => `<div class="history-chip">${c}</div>`).join('')}
      </div>
    </div>`;
  });

  document.getElementById('content-history').innerHTML = html;
}

</script>
</body>
</html>
